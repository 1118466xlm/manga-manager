<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>漫画整理</title>
<meta name="theme-color" content="#f6f4f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="漫画整理">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📚</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f6f4f1'/><text x='50' y='0.8em' text-anchor='middle' font-size='64'>📚</text></svg>">
<link rel="manifest" href="/manga-manager/manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f6f4f1;
  --card-bg: #fff;
  --text: #3b3530;
  --text-sub: #9b948c;
  --accent: #7d9d8c;
  --accent-hover: #5c7d6c;
  --ongoing: #d4956a;
  --completed: #7d9d8c;
  --border: #eae5df;
  --row-hover: #faf8f5;
}

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  /* iPhone 安全区域 */
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 12px 80px;
}

/* 头部 */
.header {
  text-align: center;
  padding: 40px 0 8px;
}
.header h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.header .count {
  font-size: 13px;
  color: var(--text-sub);
  margin-top: 4px;
}
.btn-install-header {
  width: 36px; height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: var(--card-bg);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  vertical-align: middle;
  margin-left: 6px;
  position: relative;
  top: -2px;
  transition: all 0.2s;
  padding: 0;
}
.btn-install-header:hover {
  border-color: var(--accent);
  background: var(--accent);
}

/* Tab */
.tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 24px 0 28px;
}
.tab {
  padding: 9px 26px;
  border: 1.5px solid var(--border);
  border-radius: 24px;
  background: var(--card-bg);
  cursor: pointer;
  font-size: 14px;
  color: var(--text-sub);
  transition: all 0.25s;
  user-select: none;
}
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.tab.ongoing-tab.active { background: var(--ongoing); border-color: var(--ongoing); }

/* 操作栏 */
.actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.actions-left { display: flex; align-items: center; gap: 8px; }
.actions-right { display: flex; align-items: center; gap: 8px; }

.search-box { position: relative; }
.search-box input {
  padding: 9px 14px 9px 34px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--card-bg);
  font-size: 14px;
  width: 200px;
  outline: none;
  transition: border-color 0.25s;
  font-family: inherit;
}
.search-box input:focus { border-color: var(--accent); }
.search-box .search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text-sub); font-size: 14px; pointer-events: none;
}

.btn {
  padding: 9px 18px;
  border: none;
  border-radius: 22px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.25s;
  font-family: inherit;
  white-space: nowrap;
}
.btn-add { background: var(--accent); color: #fff; }
.btn-add:hover { background: var(--accent-hover); }
.btn-add.ongoing-btn { background: var(--ongoing); }
.btn-add.ongoing-btn:hover { background: #c08055; }

.btn-sm {
  padding: 7px 14px;
  font-size: 12px;
  border-radius: 18px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* === 列表 === */
.manga-list {
  background: var(--card-bg);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #faf8f5;
  border-bottom: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.04em;
}
.group-header .group-count {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-sub);
  opacity: 0.8;
  margin-left: auto;
}

.list-row {
  display: flex;
  align-items: center;
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
}
.list-row:last-child { border-bottom: none; }
.list-row:hover { background: var(--row-hover); }
.list-row.read { opacity: 0.65; }

.read-badge {
  display: inline-block;
  color: #5ea87a;
  font-size: 12px;
  margin-left: 4px;
  font-weight: 700;
}

.col-name    { flex: 2.2; min-width: 0; }
.col-group   { flex: 1; min-width: 0; }
.col-update  { flex: 1.2; min-width: 0; }
.col-genre   { flex: 0 0 48px; }
.col-actions { flex: 0 0 56px; }

.col-name .manga-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.col-name .status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
  position: relative; top: -1px;
}
.dot-ongoing  { background: var(--ongoing); }
.dot-completed { background: var(--accent); }

.col-group .group-text {
  font-size: 11px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.col-update .update-text {
  font-size: 11px;
  color: var(--text-sub);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.col-genre .genre-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
.genre-bg  { background: #e8e0f0; color: #7b5ea7; }
.genre-bl  { background: #d5e8f0; color: #4f7d9e; }
.genre-other { background: rgba(139,128,143,0.1); color: var(--text-sub); }

.col-actions .row-actions {
  display: flex;
  gap: 2px;
  justify-content: flex-end;
}
.row-actions button {
  width: 22px; height: 22px;
  border: none;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  color: #c5bdb5;
  font-size: 13px;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.row-actions button:hover { color: var(--text); background: rgba(0,0,0,0.04); }
.row-actions .btn-move:hover   { color: var(--accent); }
.row-actions .btn-delete:hover { color: #d47b7b; background: rgba(212,123,123,0.08); }
.row-actions .btn-read { color: #c5bdb5; }
.row-actions .btn-read:hover { color: #5ea87a; background: rgba(94,168,122,0.08); }
.row-actions .btn-read.done { color: #5ea87a; }

.empty-state {
  text-align: center;
  padding: 56px 20px;
  color: var(--text-sub);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* === 弹窗 === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(50,40,45,0.3);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 32px 28px 28px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 8px 40px rgba(50,40,45,0.15);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal h3 { font-size: 19px; font-weight: 600; margin-bottom: 20px; }
.modal .form-group { margin-bottom: 16px; }
.modal label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-sub); margin-bottom: 6px;
}
.modal input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.25s;
  font-family: inherit;
}
.modal input:focus { border-color: var(--accent); background: #fff; }

.genre-options { display: flex; gap: 8px; }
.genre-opt {
  flex: 1;
  padding: 9px 0;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  cursor: pointer;
  text-align: center;
  font-size: 14px;
  color: var(--text-sub);
  transition: all 0.2s;
  user-select: none;
}
.genre-opt:hover { border-color: var(--accent); color: var(--accent); }
.genre-opt.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
#customGenreInput { margin-top: 10px; display: none; }

.modal .form-actions {
  display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end;
}
.btn-cancel { background: var(--bg); color: var(--text-sub); }
.btn-cancel:hover { background: var(--border); }
.btn-save { background: var(--accent); color: #fff; }
.btn-save:hover { background: var(--accent-hover); }

/* toast */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 10px 22px; border-radius: 22px;
  font-size: 13px; z-index: 200;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* 底部工具栏 */
.footer-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 24px;
  padding-bottom: 16px;
}
.footer-bar button {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 18px;
  background: var(--card-bg);
  color: var(--text-sub);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.footer-bar button:hover { border-color: var(--accent); color: var(--accent); }

/* PWA 诊断面板 */
.pwa-debug {
  background: #fffbf0;
  border: 1px solid #e8d896;
  border-radius: 12px;
  padding: 16px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--text);
}
.pwa-debug .debug-title { font-weight: 600; margin-bottom: 8px; }
.pwa-debug .check-item { padding: 3px 0; }
.pwa-debug .check-pass { color: #4a9; }
.pwa-debug .check-fail { color: #d47b7b; }

/* 安装提示条 */
.install-banner {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--text);
  color: #fff;
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0));
  z-index: 300;
  text-align: center;
  font-size: 14px;
  animation: slideUpBanner 0.4s ease;
}
@keyframes slideUpBanner { from { transform: translateY(100%); } to { transform: translateY(0); } }
.install-banner button {
  margin-left: 12px;
  padding: 6px 16px;
  border: none;
  border-radius: 16px;
  background: #fff;
  color: var(--text);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}

/* 响应式 */
@media (max-width: 600px) {
  .header { padding-top: 20px; }
  .header h1 { font-size: 21px; }
  .actions { flex-direction: column; align-items: stretch; }
  .actions-left { flex-wrap: wrap; }
  .actions-right { justify-content: flex-end; }
  .search-box input { width: 100%; }

  .list-row { flex-wrap: wrap; padding: 8px 10px; gap: 2px 0; }
  .col-name    { flex: 0 0 100%; order: 1; }
  .col-group   { flex: 1 0 auto; order: 2; }
  .col-update  { flex: 1 0 auto; order: 3; }
  .col-genre   { flex: 0 0 auto; order: 4; }
  .col-actions { flex: 0 0 100%; order: 5; display: flex; justify-content: flex-end; }
  .col-group .group-text,
  .col-update .update-text { font-size: 11px; }
  .col-name .manga-title { font-size: 13px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>漫画整理 <button class="btn-install-header" id="btnInstallHeader" onclick="installPWA()" style="display:none" title="安装到桌面">📲</button></h1>
    <div class="count" id="countText">共 0 部漫画</div>
  </div>

  <div class="tabs">
    <button class="tab ongoing-tab active" onclick="switchTab('ongoing')">连载中</button>
    <button class="tab completed-tab" onclick="switchTab('completed')">完结</button>
  </div>

  <div class="actions">
    <div class="actions-left">
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="searchInput" placeholder="搜索..." oninput="renderManga()">
      </div>
    </div>
    <div class="actions-right">
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-add ongoing-btn" id="addBtn" onclick="openModal()">+ 添加漫画</button>
    </div>
  </div>

  <div class="manga-list" id="mangaList">
    <div id="mangaRows"></div>
  </div>

  <div class="footer-bar">
    <button onclick="exportData()">📤 导出数据</button>
    <button onclick="document.getElementById('importFile').click()">📥 导入数据</button>
  </div>
  <div style="text-align:center;padding:0 0 12px;font-size:10px;color:#ccc;">v250516</div>

  <!-- PWA 诊断面板 -->
  <div class="pwa-debug" id="pwaDebug" style="display:none">
    <div class="debug-title">PWA 状态检测</div>
    <div id="debugContent"></div>
    <button class="btn-sm" onclick="document.getElementById('pwaDebug').style.display='none'" style="margin-top:8px">关闭</button>
  </div>
</div>

<!-- 安装提示条 -->
<div class="install-banner" id="installBanner">
  添加到主屏幕，像 App 一样使用
  <button onclick="installPWA()">安装</button>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modalTitle">添加漫画</h3>
    <div class="form-group">
      <label>漫画名</label>
      <input type="text" id="inputName" placeholder="输入漫画名称">
    </div>
    <div class="form-group">
      <label>汉化组</label>
      <input type="text" id="inputGroup" placeholder="输入汉化组名称">
    </div>
    <div class="form-group">
      <label>更新状态</label>
      <input type="text" id="inputUpdate" placeholder="例如：第12话 / 已完结 / 休刊中">
    </div>
    <div class="form-group">
      <label>漫画类型</label>
      <div class="genre-options">
        <div class="genre-opt" data-genre="BG" onclick="selectGenre('BG', this)">BG</div>
        <div class="genre-opt selected" data-genre="BL" onclick="selectGenre('BL', this)">BL</div>
        <div class="genre-opt" data-genre="__other__" onclick="selectGenre('__other__', this)">其他</div>
      </div>
      <input type="text" id="customGenreInput" placeholder="输入自定义类型">
    </div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" onclick="saveManga()">保存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'manga_manager_data';
const CACHE_NAME = 'manga-manager-v2';

let currentTab = 'ongoing';
let editingId = null;
let selectedGenre = 'BL';
let mangaData = [];

// === 数据 ===
function loadData() {
  try { mangaData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { mangaData = []; }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(mangaData));
}

// === 导入导出 ===
function exportData() {
  const blob = new Blob([JSON.stringify(mangaData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'manga-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      const count = data.length;
      // 合并：用 id 去重，新的覆盖旧的
      const map = new Map(mangaData.map(m => [m.id, m]));
      data.forEach(m => { if (m.id && m.name) map.set(m.id, m); });
      mangaData = Array.from(map.values());
      saveData();
      renderManga();
      showToast(`已导入 ${count} 条记录`);
    } catch(err) {
      showToast('导入失败，请检查文件格式');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function fetchImport() {
  try {
    const resp = await fetch('/manga-manager/manga-import.json');
    if (!resp.ok) throw new Error('文件不存在');
    const data = await resp.json();
    if (!Array.isArray(data)) throw new Error('格式错误');
    const map = new Map(mangaData.map(m => [m.id, m]));
    data.forEach(m => { if (m.id && m.name) map.set(m.id, m); });
    mangaData = Array.from(map.values());
    saveData();
    renderManga();
    showToast('已导入 ' + data.length + ' 部漫画');
  } catch(e) {
    showToast('导入失败，请稍后重试');
  }
}

// === Tab ===
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab === 'ongoing') {
    document.querySelector('.ongoing-tab').classList.add('active');
    document.getElementById('addBtn').className = 'btn btn-add ongoing-btn';
  } else {
    document.querySelector('.completed-tab').classList.add('active');
    document.getElementById('addBtn').className = 'btn btn-add';
  }
  renderManga();
}

// === 类型选择 ===
function selectGenre(val, el) {
  selectedGenre = val;
  document.querySelectorAll('.genre-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const customInput = document.getElementById('customGenreInput');
  if (val === '__other__') {
    customInput.style.display = 'block';
    customInput.focus();
  } else {
    customInput.style.display = 'none';
    customInput.value = '';
  }
}

function getGenreValue() {
  if (selectedGenre === '__other__') {
    return document.getElementById('customGenreInput').value.trim() || '其他';
  }
  return selectedGenre || 'BG';
}

// === 弹窗 ===
function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '编辑漫画' : '添加漫画';

  if (id) {
    const m = mangaData.find(x => x.id === id);
    if (m) {
      document.getElementById('inputName').value = m.name || '';
      document.getElementById('inputGroup').value = m.group || '';
      document.getElementById('inputUpdate').value = m.update || '';

      const genre = m.genre || 'BG';
      if (genre === 'BG' || genre === 'BL') {
        selectGenre(genre, document.querySelector(`.genre-opt[data-genre="${genre}"]`));
      } else {
        selectGenre('__other__', document.querySelector('.genre-opt[data-genre="__other__"]'));
        document.getElementById('customGenreInput').value = genre;
      }
    }
  } else {
    document.getElementById('inputName').value = '';
    document.getElementById('inputGroup').value = '';
    document.getElementById('inputUpdate').value = '';
    selectGenre('BL', document.querySelector('.genre-opt[data-genre="BL"]'));
  }
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  editingId = null;
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveManga() {
  const name = document.getElementById('inputName').value.trim();
  const group = document.getElementById('inputGroup').value.trim();
  const update = document.getElementById('inputUpdate').value.trim();
  const genre = getGenreValue();

  if (!name) { showToast('请输入漫画名'); return; }

  if (editingId) {
    const m = mangaData.find(x => x.id === editingId);
    if (m) { m.name = name; m.group = group; m.update = update; m.genre = genre; }
  } else {
    mangaData.push({
      id: Date.now(),
      name, group, update, genre,
      status: currentTab === 'ongoing' ? 'ongoing' : 'completed'
    });
  }
  saveData();
  closeModal();
  renderManga();
  showToast(editingId ? '已更新' : '已添加');
}

function deleteManga(id) {
  if (!confirm('确定删除这部漫画吗？')) return;
  mangaData = mangaData.filter(x => x.id !== id);
  saveData();
  renderManga();
  showToast('已删除');
}

function toggleStatus(id) {
  const m = mangaData.find(x => x.id === id);
  if (!m) return;
  m.status = m.status === 'ongoing' ? 'completed' : 'ongoing';
  if (m.status === 'ongoing') m.read = false;
  saveData();
  renderManga();
  showToast(m.status === 'ongoing' ? '已移至连载中' : '已移至完结');
}

function toggleRead(id) {
  const m = mangaData.find(x => x.id === id);
  if (!m) return;
  m.read = !m.read;
  saveData();
  renderManga();
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

// === 渲染列表 ===
function renderManga() {
  const rowsEl = document.getElementById('mangaRows');
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  let list = mangaData.filter(m => m.status === currentTab);
  if (search) {
    list = list.filter(m =>
      m.name.toLowerCase().includes(search) ||
      m.group.toLowerCase().includes(search) ||
      (m.genre || '').toLowerCase().includes(search) ||
      (m.update || '').toLowerCase().includes(search)
    );
  }

  const total = mangaData.length;
  const ongoingCount = mangaData.filter(m => m.status === 'ongoing').length;
  const completedCount = mangaData.filter(m => m.status === 'completed').length;
  document.getElementById('countText').textContent =
    `共 ${total} 部漫画 · 连载 ${ongoingCount} · 完结 ${completedCount}`;

  if (list.length === 0) {
    const hasData = mangaData.length > 0;
    rowsEl.innerHTML = '<div class="empty-state">'
      + '<div class="empty-icon">📚</div>'
      + '<p>' + (search ? '没有找到匹配的漫画' : (currentTab === 'ongoing' ? '还没有连载中的漫画' : '还没有完结的漫画')) + '</p>'
      + (!hasData && !search ? '<button class="btn btn-add" onclick="fetchImport()" style="margin-top:16px">📥 一键导入 60 部漫画</button>' : '')
      + '</div>';
    return;
  }

  function renderRow(m) {
    const genreClass = m.genre === 'BG' ? 'genre-bg' : m.genre === 'BL' ? 'genre-bl' : 'genre-other';
    const readBadge = m.read ? '<span class="read-badge">✓ 已看</span>' : '';
    const readCls = m.read ? ' read' : '';
    const readBtn = m.status === 'completed'
      ? '<button class="btn-read' + (m.read ? ' done' : '') + '" title="' + (m.read ? '标为未看' : '标为已看') + '" onclick="toggleRead(' + m.id + ')">👁</button>'
      : '';
    return '<div class="list-row' + readCls + '">'
      + '<div class="col col-name"><span class="manga-title"><span class="status-dot ' + (m.status === 'ongoing' ? 'dot-ongoing' : 'dot-completed') + '"></span>' + escHtml(m.name) + readBadge + '</span></div>'
      + '<div class="col col-group"><span class="group-text">' + (m.group ? escHtml(m.group) : '<span style="color:#ccc">-</span>') + '</span></div>'
      + '<div class="col col-update"><span class="update-text">' + (m.update ? escHtml(m.update) : '<span style="color:#ccc">-</span>') + '</span></div>'
      + '<div class="col col-genre"><span class="genre-tag ' + genreClass + '">' + escHtml(m.genre || '-') + '</span></div>'
      + '<div class="col col-actions"><div class="row-actions">'
      + readBtn
      + '<button class="btn-move" title="' + (m.status === 'ongoing' ? '移至完结' : '移至连载') + '" onclick="toggleStatus(' + m.id + ')">' + (m.status === 'ongoing' ? '✓' : '↩') + '</button>'
      + '<button title="编辑" onclick="openModal(' + m.id + ')">✎</button>'
      + '<button class="btn-delete" title="删除" onclick="deleteManga(' + m.id + ')">✕</button>'
      + '</div></div></div>';
  }

  // 非搜索状态按汉化组分组
  if (!search) {
    const groups = new Map();
    const noGroup = [];
    list.forEach(m => {
      const g = (m.group || '').trim();
      if (g) {
        if (!groups.has(g)) groups.set(g, []);
        groups.get(g).push(m);
      } else {
        noGroup.push(m);
      }
    });
    // 组名排序
    const sorted = Array.from(groups.keys()).sort((a, b) => a < b ? -1 : a > b ? 1 : 0);
    let html = '';
    sorted.forEach(g => {
      const entries = groups.get(g);
      if (entries.length >= 2) {
        html += '<div class="group-header"><span class="group-name">' + escHtml(g) + '</span><span class="group-count">' + entries.length + '部</span></div>';
      }
      entries.forEach(m => { html += renderRow(m); });
    });
    noGroup.forEach(m => { html += renderRow(m); });
    rowsEl.innerHTML = html;
  } else {
    rowsEl.innerHTML = list.map(m => renderRow(m)).join('');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// === Service Worker 注册（尽早注册） ===
let swReady = false;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/manga-manager/sw.js')
    .then(reg => {
      // 监听新 SW 发现
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (newSW) {
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'activated') location.reload();
          });
        }
      });
      // 主动检查更新
      reg.update().catch(() => {});
      return navigator.serviceWorker.ready;
    })
    .then(() => {
      swReady = true;
      // 再次确保拿到的是最新 SW
      navigator.serviceWorker.getRegistration().then(r => {
        if (r) r.update().catch(() => {});
      });
    })
    .catch(() => {});
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'SW_UPDATED') location.reload();
  });
  // 定时检查更新（每30分钟）
  setInterval(() => {
    navigator.serviceWorker.getRegistration().then(r => {
      if (r) r.update().catch(() => {});
    });
  }, 1800000);
}

// === 参与度追踪（Chrome 要求 30s + 两次访问间隔≥5分钟） ===
const ENGAGE_KEY = 'manga_engage';
const sessionStart = Date.now();
let engageData = { totalTime: 0, visitCount: 0, firstVisit: null, lastVisit: null };

try {
  const raw = localStorage.getItem(ENGAGE_KEY);
  if (raw) engageData = JSON.parse(raw);
} catch(e) {}

engageData.visitCount++;
if (!engageData.firstVisit) engageData.firstVisit = sessionStart;
engageData.lastVisit = sessionStart;
localStorage.setItem(ENGAGE_KEY, JSON.stringify(engageData));

// 每15秒更新累计时间
setInterval(() => {
  engageData.totalTime += 15;
  localStorage.setItem(ENGAGE_KEY, JSON.stringify(engageData));
}, 15000);

function getEngageStatus() {
  const now = Date.now();
  const sessionElapsed = Math.floor((now - sessionStart) / 1000);
  const totalTime = engageData.totalTime + sessionElapsed;
  const timeOk = totalTime >= 30;
  const visitsOk = engageData.visitCount >= 2;
  const intervalOk = engageData.lastVisit && engageData.firstVisit &&
    (engageData.lastVisit - engageData.firstVisit) >= 5 * 60 * 1000;
  return { sessionElapsed, totalTime, visits: engageData.visitCount, timeOk, visitsOk, intervalOk };
}

// === PWA 安装 ===
const installHeader = document.getElementById('btnInstallHeader');
let deferredPrompt = null;
let checkResults = {};

// 诊断检测
async function runDiagnostics() {
  const results = {};

  // 1. HTTPS
  results.https = location.protocol === 'https:';

  // 2. Manifest
  try {
    const manifestLink = document.querySelector('link[rel="manifest"]');
    results.manifestLink = !!manifestLink;
    if (manifestLink) {
      const resp = await fetch(manifestLink.href);
      const json = await resp.json();
      results.manifestName = !!json.name;
      results.manifestDisplay = json.display === 'standalone' || json.display === 'fullscreen';
      results.manifestIcons = !!(json.icons && json.icons.length >= 2);
    }
  } catch(e) {
    results.manifestError = e.message;
  }

  // 3. Service Worker
  results.serviceWorkerSupported = 'serviceWorker' in navigator;
  if (results.serviceWorkerSupported) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      results.swRegistered = regs.length > 0;
      if (regs.length > 0) {
        results.swScope = regs[0].scope;
        results.swActive = !!regs[0].active;
        results.swState = regs[0].active ? regs[0].active.state : (regs[0].installing ? regs[0].installing.state : 'unknown');
        results.swControlling = !!navigator.serviceWorker.controller;
        results.swControllerState = navigator.serviceWorker.controller ? navigator.serviceWorker.controller.state : 'none';
      }
    } catch(e) {
      results.swError = e.message;
    }
  }

  // 4. beforeinstallprompt
  results.bipFired = !!deferredPrompt;
  results.bipPlatforms = deferredPrompt ? (deferredPrompt.platforms || []) : [];
  results.bipSupported = typeof BeforeInstallPromptEvent !== 'undefined';

  checkResults = results;
  return results;
}

// 显示诊断
let retryTimer = null;

function showDiagnostics() {
  const panel = document.getElementById('pwaDebug');
  const content = document.getElementById('debugContent');

  runDiagnostics().then(r => {
    const pass = (v) => v ? '<span class="check-pass">✓</span>' : '<span class="check-fail">✗</span>';
    const allPass = r.https && r.manifestName && r.manifestDisplay && r.manifestIcons && r.swRegistered && r.swActive;

    let html = '';
    html += '<div class="check-item">' + pass(r.https) + ' HTTPS</div>';
    html += '<div class="check-item">' + pass(r.manifestName) + ' Manifest 配置</div>';
    html += '<div class="check-item">' + pass(r.manifestIcons) + ' 图标</div>';
    html += '<div class="check-item">' + pass(r.swRegistered) + ' SW 注册 (' + (r.swState||'?') + ')</div>';
    if (r.swRegistered) {
      html += '<div class="check-item">' + pass(r.swControlling) + ' SW 控制页面</div>';
    }
    html += '<div class="check-item">' + pass(r.bipFired) + ' Chrome 安装就绪</div>';

    if (allPass && !r.bipFired) {
      html += '<div style="margin-top:12px;padding:10px;background:#fff;border-radius:8px;border:1px solid #e0d8c0;font-size:13px;color:#7b6e50;">';
      html += '<strong>技术检查全部通过 ✓</strong><br>';

      if (!r.bipSupported) {
        html += '<br><div style="font-size:12px;color:#c04040;line-height:1.6;">';
        html += '⚠ <b>手机缺少 Google Play 服务</b>，Chrome 无法触发安装。<br><br>';
        html += '<b>解决方案：</b>安装 <b>Microsoft Edge</b> 浏览器<br>';
        html += '（Edge 不依赖 Play 服务，支持完整 PWA 安装）';
        html += '</div>';
      } else {
        const eg = getEngageStatus();
        const passE = (v) => v ? '<span class="check-pass">✓</span>' : '<span class="check-fail">✗</span>';
        html += '<br><div style="font-size:12px;margin-bottom:8px;">Chrome 参与度要求：</div>';
        html += '<div class="check-item">' + passE(eg.timeOk) + ' 浏览时间 ≥ 30秒 (已浏览 ' + eg.sessionElapsed + '秒)</div>';
        html += '<div class="check-item">' + passE(eg.visitsOk) + ' 访问次数 ≥ 2次 (已访问 ' + eg.visits + '次)</div>';
        html += '<div class="check-item">' + passE(eg.intervalOk) + ' 首次/末次间隔 ≥ 5分钟</div>';
        html += '<br><div style="font-size:12px;">满足全部条件后，安装提示会自动出现。</div>';
      }
      html += '</div>';

      if (!retryTimer && r.bipSupported) {
        retryTimer = setInterval(() => {
          if (deferredPrompt) {
            clearInterval(retryTimer);
            retryTimer = null;
            document.getElementById('installBanner').style.display = 'block';
            showToast('安装就绪！点击底部安装');
          }
        }, 3000);
      }
    }
    if (allPass && !r.swControlling) {
      html += '<div style="margin-top:12px;padding:10px;background:#ffe;border-radius:8px;border:1px solid #e0c0c0;font-size:13px;color:#a04040;">';
      html += '<strong>SW 未控制页面 ⚠</strong><br><br>';
      html += '需要刷新一次页面让 Service Worker 接管。<br><br>';
      html += '<button onclick="location.reload()" style="padding:6px 16px;background:#d47b7b;color:#fff;border:none;border-radius:14px;font-size:13px;cursor:pointer;">刷新页面</button>';
      html += '</div>';
    }

    if (r.manifestError) {
      html += '<div class="check-item"><span class="check-fail">✗</span> Manifest: ' + r.manifestError + '</div>';
    }
    if (r.swError) {
      html += '<div class="check-item"><span class="check-fail">✗</span> SW: ' + r.swError + '</div>';
    }

    content.innerHTML = html;
    panel.style.display = 'block';
  }).catch(e => {
    content.innerHTML = '<div class="check-item"><span class="check-fail">✗</span> 异常: ' + e.message + '</div>';
    panel.style.display = 'block';
  });
}

// 初始检测
runDiagnostics();

// 如果不是独立窗口模式，显示安装按钮
if (!window.matchMedia('(display-mode: standalone)').matches) {
  installHeader.style.display = 'inline-block';
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
  checkResults.bipFired = true;
  const panel = document.getElementById('pwaDebug');
  if (panel.style.display === 'block') showDiagnostics();
  if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
  installHeader.style.display = 'none';
  showToast('已安装到桌面');
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(result => {
      if (result.outcome === 'accepted') {
        deferredPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
        installHeader.style.display = 'none';
      }
    });
  } else {
    showDiagnostics();
  }
}

// Manifest 通过静态文件引用 (manifest.json)

loadData();
renderManga();
</script>
